<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PSL 2026 Live</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(180deg, #022c22, #064e3b);
    color: white;
}

.header {
    padding: 16px;
    text-align: center;
    font-weight: 700;
    font-size: 22px;
    background: linear-gradient(90deg, #065f46, #10b981);
    letter-spacing: 1px;
    box-shadow: 0 4px 20px rgba(16,185,129,0.4);
}

.container {
    padding: 10px;
}

.player-box {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(16,185,129,0.3);
}

.player-box iframe {
    width: 100%;
    height: 230px;
    border: none;
}

.click-overlay {
    position: absolute;
    inset: 0;
    z-index: 5;
}

.live-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #22c55e;
    color: black;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: bold;
}

.channel-bar {
    margin-top: 10px;
    padding: 12px;
    border-radius: 14px;
    background: linear-gradient(135deg, #064e3b, #022c22);
}

select {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 15px;
}

.card {
    margin-top: 12px;
    padding: 16px;
    border-radius: 16px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
}

.card h3 {
    font-size: 18px;
    margin-bottom: 6px;
}

.card p {
    font-size: 14px;
    opacity: 0.85;
}

.social-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
}

.btn {
    flex: 1;
    padding: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: 600;
}

.btn img {
    width: 20px;
}

.telegram {
    background: linear-gradient(135deg, #229ED9, #2563eb);
}

.instagram {
    background: linear-gradient(135deg, #f09433, #dc2743);
}

.banner {
    margin-top: 12px;
}

.banner img {
    width: 100%;
    border-radius: 14px;
}

.footer-space {
    height: 10px;
}
</style>

</head>

<body>

<div class="header">🏏 CRICKCAST PSL 2026 LIVE</div>

<div class="container">

    <div class="player-box">
        <div class="live-badge">LIVE</div>

        <!-- FIRST CLICK AD -->
        <div class="click-overlay" id="overlay" onclick="handleAdClick()"></div>

        <!-- DEFAULT BEST STREAM -->
        <iframe id="player" 
        src="https://psl-ios.pages.dev/" 
        allow="autoplay; encrypted-media" 
        allowfullscreen></iframe>
    </div>

    <div class="channel-bar">
        <select onchange="changeChannel(this.value)">
            <option value="https://psl-ios.pages.dev/">PSL iOS Stream (Best)</option>
            <option value="https://w-buzz.pages.dev/">Willow HD (Windows)</option>
        </select>
    </div>

    <div class="card">
        <h3>🚀 Stay Connected with CrickCast</h3>
        <p>
            Get instant PSL updates, backup links, and exclusive match content.
        </p>

        <div class="social-row">
            <a href="https://t.me/addlist/6qALMSdKoVVkNWI1" target="_blank" class="btn telegram">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
                Telegram
            </a>

            <a href="https://www.instagram.com/crickcast.live" target="_blank" class="btn instagram">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
                Instagram
            </a>
        </div>
    </div>

    <div class="banner">
        <a href="https://wa.me/447955881183" target="_blank">
            <img src="https://github.com/Vk1817/IPL1/blob/main/offstumphd.jpg?raw=true">
        </a>
    </div>

    <div class="footer-space"></div>

</div>

<script>
function changeChannel(url) {
    document.getElementById("player").src = url;
    document.getElementById("overlay").style.display = "block";
}

function handleAdClick() {
    window.open("https://offstump.com", "_blank");
    document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
