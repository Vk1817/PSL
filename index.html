<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRICKCAST - PSL LIVE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #0f2e1f, #05070a);
    font-family: 'Poppins', sans-serif;
    color: #fff;
}

.header {
    padding: 18px;
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    color: #00ff9c;
}

.player-wrapper {
    width: 92%;
    margin: 15px auto;
    border-radius: 18px;
    overflow: hidden;
    background: linear-gradient(145deg, #17402a, #0b2414);
    box-shadow: 0 0 25px rgba(0,255,150,0.4);
    position: relative;
}

.my-iframe {
    width: 100%;
    aspect-ratio: 16/9;
}

.my-iframe iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* Click Ad */
.ad-overlay {
    position: absolute;
    inset: 0;
    z-index: 10;
    cursor: pointer;
}

.control-bar {
    padding: 10px;
    text-align: center;
    font-size: 15px;
}

.live-box {
    margin: 10px auto;
    width: 100px;
    padding: 6px;
    text-align: center;
    border-radius: 20px;
    border: 1px solid #00ff9c;
    color: #00ff9c;
}

/* Banner */
.banner {
    width: 92%;
    margin: 15px auto;
}
.banner img {
    width: 100%;
    border-radius: 10px;
}

/* Telegram button */
.telegram-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background: #0088cc;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
}
.telegram-btn img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
}
</style>

</head>

<body>

<div class="header">PSL LIVE STREAM</div>

<div class="player-wrapper">

    <div class="my-iframe">
        <iframe src="https://willow-crickcast.pages.dev/"
        allowfullscreen
        allow="autoplay; encrypted-media"></iframe>
    </div>

    <!-- First Click Ad -->
    <div class="ad-overlay" id="adOverlay"></div>

    <div class="control-bar">
        <span>Willow Sports Live</span>
    </div>

</div>

<div class="live-box">● LIVE</div>

<!-- 🔥 Banner (NOW OPENS WHATSAPP) -->
<div class="banner">
    <a href="https://wa.me/447955881183" target="_blank">
        <img src="https://github.com/Vk1817/IPL1/blob/main/offstumphd.jpg?raw=true">
    </a>
</div>

<!-- 🔥 Telegram Button -->
<a href="https://t.me/vaathala1" target="_blank" class="telegram-btn">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</a>

<script>
// First click → offstump
let firstClickDone = false;

document.getElementById("adOverlay").addEventListener("click", () => {
    if (!firstClickDone) {
        firstClickDone = true;

        window.open("https://offstump.com", "_blank");

        document.getElementById("adOverlay").style.display = "none";
    }
});
</script>

</body>
</html>
